# Ablation config: full tensor MTO without CG coupling.

num_features: 128
num_modes: 8
mode_channels: 64
maxl: 3
scalar_only: false

use_signed_routing: true
use_cg_coupling: false
use_tensor_gate: true

coupling_type: "minimal"
gate_type: "tensor_information"
k_policy: "fixed"
normalization: "l2"
order_specific_signs: true
gate_alpha: 0.1

active_heads:
  - scalar
  - vector
  - rank2
  - spectral

routing_hidden_dim: 64
gate_hidden_dim: 64
readout_hidden_dim: 128
spectral_bins: 3501