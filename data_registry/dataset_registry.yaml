    file_manifest: /data/home/scwc008/run/xxy/MTO/data/qm9s/FIGSHARE_ALL_FILES_MANIFEST.json
    molecule_count: ~134000
    elements: [H, C, N, O, F]
    target_types:
      - scalar (dipole_magnitude, homo, lumo, gap, zpve, U0, U, H, G, Cv)
      - tensor (polarizability 3x3)
      - spectral (IR, Raman, UV-Vis)
    spectra_types:
      - IR (broadened, computed)
      - Raman (broadened, computed)
      - UV-Vis (broadened, computed)
    planned_project_role: primary_training
    limitations:
      - QM9 chemical space only (<=9 heavy atoms, H/C/N/O/F)
      - Computed spectra only, no experimental validation
      - Single equilibrium conformer per molecule
    status: available_full

  # ---------------------------------------------------------------------------
  # B. QMe14S — Broader chemistry, transfer and OOD
  # ---------------------------------------------------------------------------
  - dataset_id: qme14s
    display_name: QMe14S
    version_or_access_date: "2026-06-17"
    source_url: https://figshare.com/s/889262a4e999b5c9a5b3
    investigation_note: >
      The Figshare share link above is consistently referenced as the QMe14S
      download location. However, the underlying Figshare article ID for QMe14S
      (separate from QM9S article 24235333) could not be resolved via the
      Figshare public API. The share page may have been updated to include
      QMe14S as a separate article, but the API search index may lag.
      Manual browser access to the share link is recommended to confirm
      available files.
    paper_or_citation: >
      "QMe14S, A Comprehensive and Efficient Spectral Dataset for Small
      Organic Molecules", J. Phys. Chem. Lett. 2025, 16(16), 3972-3979
    doi: "10.1021/acs.jpclett.5c00839"
    arxiv: "2501.18876"
    license_or_access_status: >
      Public dataset on Figshare. Check Figshare article metadata for exact
      license terms. Expected CC BY or similar open license.
    local_server_path: /data/home/scwc008/run/xxy/MTO/data/external/qme14s
    local_fallback_path: /mnt/e/Ar-MTO-data-foundry/qme14s
    raw_files: []  # To be populated after Figshare article ID confirmed
    checksum_manifest: null
    file_manifest: null
    molecule_count: 186102
    elements: [H, Li, B, C, N, O, F, Na, Mg, Si, P, S, Cl, Br]
    functional_groups: 47
    level_of_theory: "B3LYP/TZVP (DFT)"
    target_types:
      - scalar (energy, atomic_charge, dipole_magnitude)
      - vector (atomic_force, dipole_moment)
      - tensor (polarizability, quadrupole, octupole, first_hyperpolarizability, Hessian)
      - spectral (IR, Raman, NMR 1H/13C)
    spectra_types:
      - IR (harmonic, computed)
      - Raman (harmonic, computed)
      - NMR (computed, 1H and 13C)
    planned_project_role: transfer_and_ood
    limitations:
      - Computed spectra only
      - Single conformer per molecule (plus AIMD configurations)
      - NMR is DFT-computed, not experimental
      - Figshare article ID needs manual confirmation
    status: pending_download

