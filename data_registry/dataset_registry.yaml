    local_server_path: /data/home/scwc008/run/xxy/MTO/data/qm9s
    local_fallback_path: null
    raw_files:
      - qm9s.pt (2.68 GiB)
      - qm9s_csv.zip (3.46 GiB)
      - ir_boraden.csv (8.13 GiB)
      - raman_boraden.csv (8.18 GiB)
      - uv_boraden.csv (1.43 GiB)
      - ext_val.zip (133 MiB)
      - ext_val_env.zip (134 MiB)
